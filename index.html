<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Space Shooter</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000;
            font-family: Arial, sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            touch-action: none;
        }
        canvas {
            border: 2px solid #fff;
            background: #000;
            touch-action: none;
            max-width: 100%;
            height: auto;
            aspect-ratio: 4 / 3;
            display: block;
        }
        .score {
            color: #fff;
            font-size: 24px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="score">Score: <span id="score">0</span></div>
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    <button id="restartBtn" style="display:none; background:#333; color:#fff; border:none; padding:10px 20px; margin-top:10px; border-radius:5px; cursor:pointer;">Restart</button>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const restartBtn = document.getElementById('restartBtn');

        // Game variables
        let player = { x: canvas.width / 2 - 25, y: canvas.height - 60, width: 50, height: 50 };
        let bullets = [];
        let enemies = [];
        let score = 0;
        let gameOver = false;
        let keys = {};
        let isShooting = false;
        let lastShot = 0;
        let shootCooldown = 200; // milliseconds
        let baseHeight = 30;
        const BASE_SECTIONS = 10;
        const BASE_TOTAL_GAP = 10;
        const baseGap = BASE_SECTIONS > 1 ? BASE_TOTAL_GAP / (BASE_SECTIONS - 1) : 0;
        let baseHealth = Array(BASE_SECTIONS).fill(1);
        let baseAnimation = 0; // for animation
        let animationFrameId = null;

        function getBaseSectionWidth() {
            return (canvas.width - BASE_TOTAL_GAP) / BASE_SECTIONS;
        }

        function getBaseSectionX(sectionIndex) {
            return sectionIndex * (getBaseSectionWidth() + baseGap);
        }

        function getBaseSectionFromX(x) {
            const sectionStride = getBaseSectionWidth() + baseGap;
            const clampedX = Math.max(0, Math.min(x, canvas.width - 1));
            return Math.min(BASE_SECTIONS - 1, Math.floor(clampedX / sectionStride));
        }

        function getTouchCanvasX(touch) {
            const rect = canvas.getBoundingClientRect();
            const normalizedX = (touch.clientX - rect.left) / rect.width;
            return normalizedX * canvas.width;
        }

        // Restart function
        function restartGame() {
            if (animationFrameId !== null) {
                cancelAnimationFrame(animationFrameId);
                animationFrameId = null;
            }
            player.x = canvas.width / 2 - 25;
            bullets = [];
            enemies = [];
            score = 0;
            scoreElement.textContent = score;
            gameOver = false;
            baseHealth = Array(BASE_SECTIONS).fill(1);
            restartBtn.style.display = 'none';
            gameLoop();
        }

        restartBtn.addEventListener('click', restartGame);

        // Event listeners
        document.addEventListener('keydown', (e) => {
            if (e.code === 'ArrowLeft' || e.code === 'ArrowRight' || e.code === 'Space') {
                e.preventDefault();
            }
            keys[e.code] = true;
        });
        document.addEventListener('keyup', (e) => {
            keys[e.code] = false;
        });

        // Touch events on canvas
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            let touchX = getTouchCanvasX(e.touches[0]);
            player.x = touchX - player.width / 2;
            if (player.x < 0) player.x = 0;
            if (player.x > canvas.width - player.width) player.x = canvas.width - player.width;
            isShooting = true;
        }, { passive: false });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            let touchX = getTouchCanvasX(e.touches[0]);
            player.x = touchX - player.width / 2;
            if (player.x < 0) player.x = 0;
            if (player.x > canvas.width - player.width) player.x = canvas.width - player.width;
        }, { passive: false });

        canvas.addEventListener('touchend', (e) => {
            e.preventDefault();
            isShooting = false;
        }, { passive: false });

        // Game functions
        function drawPlayer() {
            ctx.fillStyle = '#00f';
            ctx.fillRect(player.x, player.y, player.width, player.height);
        }

        function drawBullets() {
            ctx.fillStyle = '#ff0';
            bullets.forEach(bullet => {
                ctx.fillRect(bullet.x, bullet.y, bullet.width, bullet.height);
            });
        }

        function drawEnemies() {
            ctx.fillStyle = '#f00';
            enemies.forEach(enemy => {
                ctx.fillRect(enemy.x, enemy.y, enemy.width, enemy.height);
            });
        }

        function drawBase() {
            let baseY = canvas.height - baseHeight;
            let sectionWidth = getBaseSectionWidth();
            ctx.fillStyle = '#0f0';
            for (let s = 0; s < BASE_SECTIONS; s++) {
                let sectionX = getBaseSectionX(s);
                if (baseHealth[s] > 0) {
                    ctx.fillRect(sectionX, baseY, sectionWidth, baseHeight);
                }
            }
            // Simple animation: flash the top
            baseAnimation++;
            if (baseAnimation % 20 < 10 && baseHealth.some(h => h > 0)) {
                ctx.fillStyle = '#fff';
                for (let s = 0; s < BASE_SECTIONS; s++) {
                    let sectionX = getBaseSectionX(s);
                    if (baseHealth[s] > 0) {
                        ctx.fillRect(sectionX, baseY, sectionWidth, 2);
                    }
                }
            }
        }

        function updatePlayer() {
            if (keys['ArrowLeft'] && player.x > 0) {
                player.x -= 5;
            }
            if (keys['ArrowRight'] && player.x < canvas.width - player.width) {
                player.x += 5;
            }
        }

        function updateBullets() {
            for (let index = bullets.length - 1; index >= 0; index--) {
                const bullet = bullets[index];
                bullet.y -= 5;
                if (bullet.y < 0) {
                    bullets.splice(index, 1);
                }
            }
        }

        function updateEnemies() {
            let enemySpeed = 2 + score * 0.005; // Increase speed with score
            enemySpeed = Math.min(enemySpeed, 5); // Cap at 5
            for (let index = enemies.length - 1; index >= 0; index--) {
                const enemy = enemies[index];
                enemy.y += enemySpeed;
                if (enemy.y + enemy.height >= canvas.height - baseHeight) {
                    let section = getBaseSectionFromX(enemy.x + enemy.width / 2);
                    if (baseHealth[section] > 0) {
                        baseHealth[section]--;
                    } else {
                        // Shield broken in this section, game over
                        gameOver = true;
                    }
                    enemies.splice(index, 1);
                } else if (enemy.y > canvas.height) {
                    enemies.splice(index, 1);
                }
            }
        }

        function checkCollisions() {
            for (let bIndex = bullets.length - 1; bIndex >= 0; bIndex--) {
                const bullet = bullets[bIndex];
                for (let eIndex = enemies.length - 1; eIndex >= 0; eIndex--) {
                    const enemy = enemies[eIndex];
                    if (bullet.x < enemy.x + enemy.width &&
                        bullet.x + bullet.width > enemy.x &&
                        bullet.y < enemy.y + enemy.height &&
                        bullet.y + bullet.height > enemy.y) {
                        bullets.splice(bIndex, 1);
                        enemies.splice(eIndex, 1);
                        score += 10;
                        scoreElement.textContent = score;
                        break;
                    }
                }
            }
        }

        function spawnEnemies() {
            let spawnRate = 0.02 + score * 0.0001; // Increase spawn rate with score
            spawnRate = Math.min(spawnRate, 0.1); // Cap at 0.1
            if (Math.random() < spawnRate) {
                enemies.push({
                    x: Math.random() * (canvas.width - 50),
                    y: 0,
                    width: 50,
                    height: 50
                });
            }
        }

        function shoot() {
            if ((isShooting || keys['Space']) && Date.now() - lastShot > shootCooldown) {
                bullets.push({
                    x: player.x + player.width / 2 - 2.5,
                    y: player.y,
                    width: 5,
                    height: 10
                });
                lastShot = Date.now();
                // For keyboard, prevent continuous shooting
                if (keys['Space']) {
                    keys['Space'] = false;
                }
            }
        }

        function gameLoop() {
            if (gameOver) {
                ctx.fillStyle = '#fff';
                ctx.font = '48px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('Game Over', canvas.width / 2, canvas.height / 2);
                ctx.font = '24px Arial';
                ctx.fillText('Score: ' + score, canvas.width / 2, canvas.height / 2 + 50);
                restartBtn.style.display = 'block';
                animationFrameId = null;
                return;
            }

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            updatePlayer();
            updateBullets();
            updateEnemies();
            spawnEnemies();
            shoot();
            checkCollisions();

            drawPlayer();
            drawBullets();
            drawEnemies();
            drawBase();

            animationFrameId = requestAnimationFrame(gameLoop);
        }

        gameLoop();
    </script>
</body>
</html>
