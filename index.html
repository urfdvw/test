<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Space Shooter</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000;
            font-family: Arial, sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            touch-action: none;
        }
        canvas {
            border: 2px solid #fff;
            background: #000;
            touch-action: none;
        }
        .score {
            color: #fff;
            font-size: 24px;
            margin-bottom: 10px;
        }
        #restartBtn {
            display: none;
            background: #333;
            color: #fff;
            border: none;
            padding: 10px 20px;
            margin-top: 10px;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="score">Score: <span id="score">0</span></div>
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    <button id="restartBtn">Restart</button>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const restartBtn = document.getElementById('restartBtn');

        if (!canvas || !ctx || !scoreElement || !restartBtn) {
            throw new Error('Required DOM elements not found');
        }

        // Game constants
        const PLAYER_SPEED = 5;
        const BULLET_SPEED = 5;
        const SHOOT_COOLDOWN = 200;
        const BASE_HEIGHT = 30;
        const BASE_SECTIONS = 10;
        const BASE_ENEMY_SPEED = 2;
        const ENEMY_SPEED_SCALE = 0.005;
        const MAX_ENEMY_SPEED = 5;
        const BASE_SPAWN_RATE = 0.02;
        const SPAWN_RATE_SCALE = 0.0001;
        const MAX_SPAWN_RATE = 0.1;
        const SCORE_PER_KILL = 10;

        // Game state
        let player = { x: canvas.width / 2 - 25, y: canvas.height - 60, width: 50, height: 50 };
        let bullets = [];
        let enemies = [];
        let score = 0;
        let gameOver = false;
        let keys = {};
        let isShooting = false;
        let lastShot = 0;
        let baseHealth = new Array(BASE_SECTIONS).fill(1);
        let baseAnimation = 0;
        let animationFrameId = null;

        // Restart function
        function restartGame() {
            player.x = canvas.width / 2 - 25;
            bullets = [];
            enemies = [];
            score = 0;
            scoreElement.textContent = score;
            gameOver = false;
            baseHealth = new Array(BASE_SECTIONS).fill(1);
            restartBtn.style.display = 'none';
            if (animationFrameId !== null) {
                cancelAnimationFrame(animationFrameId);
            }
            gameLoop();
        }

        restartBtn.addEventListener('click', restartGame);

        // Event listeners
        document.addEventListener('keydown', (e) => {
            keys[e.code] = true;
        });
        document.addEventListener('keyup', (e) => {
            keys[e.code] = false;
        });

        // Touch events on canvas
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (e.touches.length === 0) return;
            let rect = canvas.getBoundingClientRect();
            let touchX = e.touches[0].clientX - rect.left;
            player.x = touchX - player.width / 2;
            if (player.x < 0) player.x = 0;
            if (player.x > canvas.width - player.width) player.x = canvas.width - player.width;
            isShooting = true;
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (e.touches.length === 0) return;
            let rect = canvas.getBoundingClientRect();
            let touchX = e.touches[0].clientX - rect.left;
            player.x = touchX - player.width / 2;
            if (player.x < 0) player.x = 0;
            if (player.x > canvas.width - player.width) player.x = canvas.width - player.width;
        });

        canvas.addEventListener('touchend', (e) => {
            e.preventDefault();
            isShooting = false;
        });

        // Game functions
        function drawPlayer() {
            ctx.fillStyle = '#00f';
            ctx.fillRect(player.x, player.y, player.width, player.height);
        }

        function drawBullets() {
            ctx.fillStyle = '#ff0';
            bullets.forEach(bullet => {
                ctx.fillRect(bullet.x, bullet.y, bullet.width, bullet.height);
            });
        }

        function drawEnemies() {
            ctx.fillStyle = '#f00';
            enemies.forEach(enemy => {
                ctx.fillRect(enemy.x, enemy.y, enemy.width, enemy.height);
            });
        }

        function drawBase() {
            let baseY = canvas.height - BASE_HEIGHT;
            let sectionWidth = (canvas.width - 20) / BASE_SECTIONS;
            let gap = 10;
            ctx.fillStyle = '#0f0';
            for (let s = 0; s < BASE_SECTIONS; s++) {
                let sectionX = s * (sectionWidth + gap / 9) + (s > 0 ? gap / 9 : 0);
                if (baseHealth[s] > 0) {
                    ctx.fillRect(sectionX, baseY, sectionWidth, BASE_HEIGHT);
                }
            }
            // Simple animation: flash the top
            baseAnimation++;
            if (baseAnimation % 20 < 10 && baseHealth.some(h => h > 0)) {
                ctx.fillStyle = '#fff';
                for (let s = 0; s < BASE_SECTIONS; s++) {
                    let sectionX = s * (sectionWidth + gap / 9) + (s > 0 ? gap / 9 : 0);
                    if (baseHealth[s] > 0) {
                        ctx.fillRect(sectionX, baseY, sectionWidth, 2);
                    }
                }
            }
        }

        function updatePlayer() {
            if (keys['ArrowLeft'] && player.x > 0) {
                player.x -= PLAYER_SPEED;
            }
            if (keys['ArrowRight'] && player.x < canvas.width - player.width) {
                player.x += PLAYER_SPEED;
            }
        }

        function updateBullets() {
            // Use filter to avoid mutating array during iteration
            bullets = bullets.filter(bullet => {
                bullet.y -= BULLET_SPEED;
                return bullet.y >= 0;
            });
        }

        function updateEnemies() {
            let enemySpeed = Math.min(BASE_ENEMY_SPEED + score * ENEMY_SPEED_SCALE, MAX_ENEMY_SPEED);
            let sectionWidth = (canvas.width - 20) / BASE_SECTIONS;

            // Use filter to avoid mutating array during iteration
            enemies = enemies.filter(enemy => {
                enemy.y += enemySpeed;
                if (enemy.y + enemy.height >= canvas.height - BASE_HEIGHT) {
                    // Use sectionWidth for correct section mapping
                    let section = Math.floor((enemy.x + enemy.width / 2) / sectionWidth);
                    section = Math.max(0, Math.min(section, BASE_SECTIONS - 1));
                    if (baseHealth[section] > 0) {
                        baseHealth[section]--;
                    } else {
                        gameOver = true;
                    }
                    return false;
                }
                return enemy.y <= canvas.height;
            });
        }

        function checkCollisions() {
            // Track indices to remove to avoid mutating arrays during iteration
            const hitBullets = new Set();
            const hitEnemies = new Set();

            bullets.forEach((bullet, bIndex) => {
                enemies.forEach((enemy, eIndex) => {
                    if (!hitBullets.has(bIndex) && !hitEnemies.has(eIndex) &&
                        bullet.x < enemy.x + enemy.width &&
                        bullet.x + bullet.width > enemy.x &&
                        bullet.y < enemy.y + enemy.height &&
                        bullet.y + bullet.height > enemy.y) {
                        hitBullets.add(bIndex);
                        hitEnemies.add(eIndex);
                        score += SCORE_PER_KILL;
                        scoreElement.textContent = score;
                    }
                });
            });

            bullets = bullets.filter((_, i) => !hitBullets.has(i));
            enemies = enemies.filter((_, i) => !hitEnemies.has(i));
        }

        function spawnEnemies() {
            let spawnRate = Math.min(BASE_SPAWN_RATE + score * SPAWN_RATE_SCALE, MAX_SPAWN_RATE);
            if (Math.random() < spawnRate) {
                enemies.push({
                    x: Math.random() * (canvas.width - 50),
                    y: 0,
                    width: 50,
                    height: 50
                });
            }
        }

        function shoot() {
            if ((isShooting || keys['Space']) && Date.now() - lastShot > SHOOT_COOLDOWN) {
                bullets.push({
                    x: player.x + player.width / 2 - 2.5,
                    y: player.y,
                    width: 5,
                    height: 10
                });
                lastShot = Date.now();
                // For keyboard, prevent continuous shooting on a single press
                if (keys['Space']) {
                    keys['Space'] = false;
                }
            }
        }

        function gameLoop() {
            if (gameOver) {
                ctx.fillStyle = '#fff';
                ctx.font = '48px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('Game Over', canvas.width / 2, canvas.height / 2);
                ctx.font = '24px Arial';
                ctx.fillText('Score: ' + score, canvas.width / 2, canvas.height / 2 + 50);
                restartBtn.style.display = 'block';
                return;
            }

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            updatePlayer();
            updateBullets();
            updateEnemies();
            spawnEnemies();
            shoot();
            checkCollisions();

            drawPlayer();
            drawBullets();
            drawEnemies();
            drawBase();

            animationFrameId = requestAnimationFrame(gameLoop);
        }

        gameLoop();
    </script>
</body>
</html>
